# Wheel platform tag. The package code is pure Python, but the wheel bundles
# the compiled OpenTUI sidecar (cortex/ui_runtime/bin/cortex-tui — a
# darwin-arm64 Mach-O binary), so a `py3-none-any` tag would let pip install
# an unusable 65MB binary on every other platform. macosx_13_0 matches the
# documented macOS 13.3+ floor; arm64 matches the Apple Silicon requirement.
# Declared here (not in the release workflow) so LOCAL builds carry the
# correct tag too; the release workflow enforces it as a hard gate.
[bdist_wheel]
plat_name = macosx_13_0_arm64
